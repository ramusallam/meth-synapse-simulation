<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuroscience Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Roboto+Mono:wght@400;500;700&family=Roboto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#F7F3EE; --white:#FFFFFF; --ink:#1C1917; --warm:#57534E; --warm-muted:#7C6F5A; --faint:#A0937B;
            --indigo:#6366F1; --indigo-2:#818CF8; --indigo-hover:#4F46E5;
            --indigo-soft:rgba(99,102,241,0.09); --indigo-line:rgba(99,102,241,0.30);
            --line:#E8E0D2; --line-soft:#F0EBE3;
            --font-sans:'Inter',system-ui,-apple-system,sans-serif;
            --font-serif:'Roboto Serif',Georgia,Cambria,serif;
            --font-mono:'Roboto Mono',monospace;
            --sh-sm:0 1px 2px rgba(17,17,17,0.05),0 2px 6px rgba(17,17,17,0.08);
            --sh-md:0 4px 12px rgba(17,17,17,0.06),0 2px 4px rgba(17,17,17,0.04);
            --sh-lg:0 16px 40px rgba(17,17,17,0.10),0 4px 12px rgba(17,17,17,0.06);
        }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }
        .serif { font-family: var(--font-serif); }
        .mono { font-family: var(--font-mono); }
        .eyebrow {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--indigo);
        }
        .app-hero {
            background: linear-gradient(150deg,#4F46E5 0%,#6366F1 100%);
            position: relative;
            overflow: hidden;
        }
        .app-hero::before {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle,rgba(255,255,255,0.06) 1px,transparent 2px);
            background-size: 40px 40px; pointer-events:none;
        }
        .lift { transition: transform .2s, box-shadow .2s; }
        .lift:hover { transform: translateY(-5px); box-shadow: var(--sh-lg); }
        @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .fade-up { animation: fadeUp .35s ease-out; }
        .tab-num { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 18, className = "" }) => {
            return (
                <i
                    data-lucide={name}
                    style={{ width: size, height: size }}
                    className={className}
                ></i>
            );
        };

        function App() {
            const [section, setSection] = useState(0);
            const [dopamine, setDopamine] = useState(30);
            const [receptors, setReceptors] = useState(6);
            const [quizResult, setQuizResult] = useState(null);
            const [isStimulantPresent, setIsStimulantPresent] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            }, [section, quizResult]);

            const sections = [
                { title: 'Overview', icon: 'info' },
                { title: 'Normal Synapse', icon: 'activity' },
                { title: 'The Disruption', icon: 'zap' },
                { title: 'Brain Adaptation', icon: 'brain' },
                { title: 'The Recovery Gap', icon: 'refresh-ccw' }
            ];

            const content = [
                {
                    title: "Stage 1: Crossing the Barrier",
                    text: "The brain is protected by a 'Blood-Brain Barrier' that filters out harmful substances. However, some synthetic molecules are small enough to pass through. Once inside, they interfere with the brain's natural communication system by mimicking the shape of neurotransmitters.",
                    dopamine: 30,
                    receptors: 6,
                    meth: false,
                    quiz: {
                        question: "How do synthetic stimulants initially bypass the brain's protective filters?",
                        options: [
                            { text: "They physically break the barrier.", value: "wrong" },
                            { text: "They are small enough to pass through the filter.", value: "correct" }
                        ],
                        feedback: "Correct! Their molecular size allows them to slip through the blood-brain barrier meant to protect your central nervous system."
                    }
                },
                {
                    title: "Stage 2: Healthy Brain Function",
                    text: "In a healthy brain, dopamine is released into the synapse to signal reward (like when you finish a hard task). Transporters then 'reuptake' or vacuum up the leftover dopamine so the signal stops, maintaining a healthy balance (homeostasis).",
                    dopamine: 35,
                    receptors: 6,
                    meth: false,
                    quiz: {
                        question: "What is the primary role of 'transporters' in a healthy synapse?",
                        options: [
                            { text: "To recycle neurotransmitters.", value: "correct" },
                            { text: "To create more receptors.", value: "wrong" }
                        ],
                        feedback: "Correct! Transporters act like a vacuum, recycling dopamine to keep levels balanced and prevent overstimulation."
                    }
                },
                {
                    title: "Stage 3: Chemical Overload",
                    text: "Certain substances disrupt this balance by forcing the sender cell to dump all its stored dopamine at once while simultaneously blocking the 'vacuum' (transporters). This creates a toxic surge of chemicals that the brain isn't designed to handle.",
                    dopamine: 100,
                    receptors: 6,
                    meth: true,
                    quiz: {
                        question: "What happens to the synaptic balance during a chemical disruption?",
                        options: [
                            { text: "Dopamine levels drop instantly.", value: "wrong" },
                            { text: "Dopamine floods the synapse and reuptake is blocked.", value: "correct" }
                        ],
                        feedback: "Exactly. The dual action of forcing release and blocking cleanup creates a massive, unhealthy chemical surge."
                    }
                },
                {
                    title: "Stage 4: Downregulation",
                    text: "The brain is highly adaptive. To protect itself from a massive chemical overload, it reduces the number of receptors on the receiver cell. This is called 'downregulation.' It's like the brain is turning down the volume because the 'music' is too loud.",
                    dopamine: 70,
                    receptors: 2,
                    meth: true,
                    quiz: {
                        question: "Why does the brain remove its own receptors (downregulation)?",
                        options: [
                            { text: "To protect itself from overstimulation.", value: "correct" },
                            { text: "To make the signal stronger.", value: "wrong" }
                        ],
                        feedback: "Correct. Downregulation is a defense mechanism. The brain attempts to restore balance by becoming less sensitive."
                    }
                },
                {
                    title: "Stage 5: The Recovery Gap",
                    text: "When the external substance is removed, the brain is left in a state of low dopamine and very few receptors. Because the 'volume' is still turned down, normal healthy activities no longer feel rewarding, leading to a long period of low energy and mood.",
                    dopamine: 10,
                    receptors: 2,
                    meth: false,
                    quiz: {
                        question: "Why do healthy activities feel less rewarding during the recovery phase?",
                        options: [
                            { text: "There aren't enough receptors left to detect natural dopamine.", value: "correct" },
                            { text: "Natural dopamine has been permanently deleted.", value: "wrong" }
                        ],
                        feedback: "Correct! The lack of receptors means the brain can't 'hear' the signal from natural, healthy sources of joy."
                    }
                }
            ];

            useEffect(() => {
                const current = content[section];
                setDopamine(current.dopamine);
                setReceptors(current.receptors);
                setIsStimulantPresent(current.meth);
                setQuizResult(null);
            }, [section]);

            const isOverload = section === 2;
            const isRecovery = section === 4;
            const particleSpeed = isOverload ? 0.8 : isRecovery ? 6 : 2.5;

            return (
                <div className="min-h-screen text-stone-900" style={{ backgroundColor: '#F7F3EE' }}>
                    <div className="app-hero px-4 md:px-8 pt-10 pb-24 text-center">
                        <div className="relative max-w-6xl mx-auto">
                            <div className="eyebrow" style={{ color: 'rgba(255,255,255,0.9)', letterSpacing: '0.34em' }}>Neuroscience Learning Lab</div>
                            <h1 className="serif text-white font-bold mt-2 mb-2" style={{ fontSize: '2.5rem', letterSpacing: '-0.5px', lineHeight: 1.08 }}>
                                Brain Health Lab
                            </h1>
                            <p className="text-white/90 text-base max-w-xl mx-auto">Visualizing Synaptic Balance and Restoration</p>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4 md:px-8 pb-8 space-y-6" style={{ marginTop: '-56px', position: 'relative', zIndex: 2 }}>

                        <header className="flex justify-center">
                            <div className="flex bg-white p-1.5 rounded-2xl shadow-md overflow-x-auto" style={{ border: '1px solid var(--line)' }}>
                                {sections.map((s, i) => (
                                    <button
                                        key={i}
                                        onClick={() => setSection(i)}
                                        className={`flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all text-xs font-bold uppercase whitespace-nowrap ${
                                            section === i
                                                ? 'bg-indigo-500 text-white shadow-md shadow-indigo-200'
                                                : 'hover:bg-indigo-50'
                                        }`}
                                        style={{ letterSpacing: '0.06em', fontFamily: 'var(--font-mono)', color: section === i ? '#fff' : 'var(--warm-muted)' }}
                                    >
                                        <Icon name={s.icon} size={14} /> {s.title}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <main className="grid lg:grid-cols-12 gap-6">

                            <div className="lg:col-span-4 space-y-6">
                                <section className="bg-white p-7 rounded-2xl lift fade-up" style={{ border: '1px solid var(--line)', boxShadow: 'var(--sh-md)' }}>
                                    <h2 className="serif text-2xl font-bold mb-4 flex items-center gap-3" style={{ color: 'var(--ink)' }}>
                                        <span className="mono flex items-center justify-center w-8 h-8 rounded-xl text-sm font-bold" style={{ background: 'var(--indigo-soft)', color: 'var(--indigo)' }}>
                                            {section + 1}
                                        </span>
                                        {content[section].title}
                                    </h2>
                                    <p className="leading-relaxed text-base mb-6" style={{ color: 'var(--warm)' }}>
                                        {content[section].text}
                                    </p>

                                    <div className="space-y-4 pt-4" style={{ borderTop: '1px solid var(--line)' }}>
                                        <div className="flex justify-between items-end">
                                            <label className="eyebrow">Dopamine Activity</label>
                                            <span className={`tab-num text-xl font-bold ${dopamine > 80 ? 'animate-pulse' : ''}`} style={{ color: dopamine > 80 ? 'var(--red, #EF4444)' : 'var(--indigo)' }}>
                                                {dopamine}%
                                            </span>
                                        </div>
                                        <div className="h-4 rounded-full overflow-hidden p-1" style={{ background: 'var(--line-soft)' }}>
                                            <motion.div
                                                initial={{ width: 0 }}
                                                animate={{ width: `${dopamine}%` }}
                                                className={`h-full rounded-full transition-colors duration-700`}
                                                style={{ background: dopamine > 80 ? '#EF4444' : isRecovery ? '#D6CEBF' : 'linear-gradient(90deg,var(--indigo),var(--indigo-2))' }}
                                            />
                                        </div>
                                    </div>
                                </section>

                                <section className="transition-all duration-700 p-6 rounded-2xl fade-up" style={{ border: '1px solid var(--line)', background: isRecovery ? '#F0EBE3' : 'var(--white)', boxShadow: 'var(--sh-sm)' }}>
                                    <h3 className="eyebrow mb-3 flex items-center gap-2" style={{ color: isRecovery ? 'var(--warm-muted)' : 'var(--indigo)' }}>
                                        <Icon name="brain" size={16} /> Biology Note
                                    </h3>
                                    <p className="text-sm italic leading-snug transition-colors" style={{ color: isRecovery ? 'var(--faint)' : 'var(--warm)' }}>
                                        {section === 3
                                            ? "Downregulation is the brain's way of seeking 'Homeostasis', keeping your internal systems stable and safe."
                                            : isRecovery
                                            ? "The recovery gap occurs because cells need time to rebuild receptors and chemical stores."
                                            : "Tiny chemical signals travel between your brain cells constantly to help you learn and feel."}
                                    </p>
                                </section>
                            </div>

                            <div className="lg:col-span-8 flex flex-col gap-6">
                                <div className={`relative flex-grow rounded-2xl border transition-all duration-1000 overflow-hidden min-h-[380px] flex items-center justify-center p-8 ${isRecovery ? 'grayscale-[0.3]' : ''}`} style={{ borderColor: 'var(--line)', background: isRecovery ? '#F0EBE3' : 'var(--white)', boxShadow: 'var(--sh-md)' }}>

                                    <div className={`absolute inset-0 opacity-20 transition-all duration-1000 ${isOverload ? 'bg-rose-300' : isRecovery ? 'bg-slate-400' : 'bg-indigo-100'}`} />

                                    <div className="relative w-full max-w-2xl aspect-video flex items-center justify-between">

                                        <motion.div
                                            animate={isOverload ? { x: [0, -2, 2, 0], scale: [1, 1.02, 1] } : {}}
                                            transition={{ repeat: Infinity, duration: 0.2 }}
                                            className="relative z-10"
                                        >
                                            <div className={`w-28 h-44 bg-gradient-to-r transition-all duration-1000 rounded-r-[60px] border-y-2 border-r-2 flex flex-col justify-around py-4 pl-4 shadow-sm ${
                                                isOverload ? 'from-rose-50 to-white border-rose-200' :
                                                isRecovery ? 'from-slate-200 to-slate-100 border-slate-300' :
                                                'from-indigo-50 to-white border-indigo-100'
                                            }`}>
                                                <motion.div
                                                    animate={isOverload ? { opacity: [1, 0], scale: [1, 1.5] } : isRecovery ? { scale: 0.6, opacity: 0.5 } : {}}
                                                    transition={isOverload ? { repeat: Infinity, duration: 0.5 } : {}}
                                                    className="w-7 h-7 rounded-full bg-indigo-100 border border-indigo-200"
                                                />
                                                <motion.div
                                                    animate={isRecovery ? { scale: 0.4, opacity: 0.3 } : {}}
                                                    className="w-7 h-7 rounded-full bg-indigo-100 border border-indigo-200"
                                                />
                                            </div>
                                            <div className="absolute -left-6 top-1/2 -translate-y-1/2 text-[9px] font-black uppercase -rotate-90" style={{ color: 'var(--indigo)', letterSpacing: '0.25em', fontFamily: 'var(--font-mono)' }}>Sender</div>
                                        </motion.div>

                                        <div className="flex-grow h-44 relative">
                                            <AnimatePresence>
                                                {[...Array(Math.max(3, Math.floor(dopamine / 5)))].map((_, i) => (
                                                    <motion.div
                                                        key={`${section}-da-${i}`}
                                                        initial={{ x: 0, y: 80, opacity: 0 }}
                                                        animate={{
                                                            x: [0, 200],
                                                            y: 80 + (Math.sin(i + section) * 60),
                                                            opacity: [0, 1, 1, 0],
                                                        }}
                                                        transition={{
                                                            duration: particleSpeed,
                                                            repeat: Infinity,
                                                            delay: i * (isOverload ? 0.05 : 0.3),
                                                            ease: isOverload ? "easeInOut" : "linear"
                                                        }}
                                                        className={`absolute w-2.5 h-2.5 rounded-full shadow-sm ${
                                                            isRecovery ? 'bg-slate-400' : 'bg-indigo-300 shadow-indigo-200'
                                                        }`}
                                                    />
                                                ))}
                                            </AnimatePresence>

                                            {isStimulantPresent && [...Array(6)].map((_, i) => (
                                                <motion.div
                                                    key={`disruptor-${i}`}
                                                    animate={{
                                                        x: [20, 160, 20],
                                                        y: [30 + (i*22), 100, 30 + (i*22)],
                                                        rotate: [0, 180, 360],
                                                        scale: isOverload ? [1, 1.2, 1] : 1
                                                    }}
                                                    transition={{ duration: 10, repeat: Infinity, ease: "easeInOut", delay: i * 0.4 }}
                                                    className={`absolute w-5 h-5 border rounded-lg flex items-center justify-center text-[10px] font-black shadow-sm ${
                                                        isOverload ? 'bg-rose-100 border-rose-300 text-rose-500' : 'bg-slate-100 border-slate-200 text-slate-400'
                                                    }`}
                                                >
                                                    !
                                                </motion.div>
                                            ))}
                                        </div>

                                        <motion.div
                                            animate={section >= 3 ? { scale: 0.85, x: 10 } : { scale: 1, x: 0 }}
                                            transition={{ duration: 0.8 }}
                                            className="relative z-10 flex flex-col items-start gap-4"
                                        >
                                            {[...Array(receptors)].map((_, i) => (
                                                <motion.div
                                                    key={i}
                                                    layout
                                                    className={`w-3.5 h-9 rounded-r-lg border shadow-sm transition-colors duration-1000 ${
                                                        section >= 3 ? 'bg-stone-200 border-stone-300' : 'bg-emerald-100 border-emerald-200'
                                                    }`}
                                                />
                                            ))}
                                            <div className="absolute -right-6 top-1/2 -translate-y-1/2 text-[9px] font-black uppercase rotate-90" style={{ color: '#10B981', letterSpacing: '0.25em', fontFamily: 'var(--font-mono)' }}>Receiver</div>
                                        </motion.div>
                                    </div>

                                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 px-6 py-2.5 bg-white/85 backdrop-blur-sm rounded-full flex items-center gap-5" style={{ border: '1px solid var(--line)', boxShadow: 'var(--sh-sm)' }}>
                                        <div className="flex items-center gap-2">
                                            <div className={`w-2.5 h-2.5 rounded-full ${isRecovery ? 'bg-stone-400' : 'bg-indigo-400'}`} />
                                            <span className="mono text-[10px] font-bold uppercase" style={{ color: 'var(--warm)', letterSpacing: '0.1em' }}>Dopamine</span>
                                        </div>
                                        {isStimulantPresent && (
                                            <div className="flex items-center gap-2 pl-5" style={{ borderLeft: '1px solid var(--line)' }}>
                                                <div className="w-2.5 h-2.5 rounded bg-rose-300" />
                                                <span className="mono text-[10px] font-bold uppercase text-rose-500" style={{ letterSpacing: '0.1em' }}>Overload</span>
                                            </div>
                                        )}
                                        <div className="flex items-center gap-2 pl-5" style={{ borderLeft: '1px solid var(--line)' }}>
                                            <div className={`w-2.5 h-2.5 rounded-sm ${section >= 3 ? 'bg-stone-300' : 'bg-emerald-200'}`} />
                                            <span className="mono text-[10px] font-bold uppercase" style={{ color: 'var(--warm)', letterSpacing: '0.1em' }}>Receptors</span>
                                        </div>
                                    </div>
                                </div>

                                <section className="transition-all duration-700 p-8 rounded-2xl relative overflow-hidden fade-up" style={{ border: '1px solid var(--line)', background: isRecovery ? '#F0EBE3' : 'var(--white)', boxShadow: 'var(--sh-md)' }}>
                                    <h3 className="serif text-xl font-bold mb-6 flex items-center gap-3" style={{ color: isRecovery ? 'var(--warm)' : 'var(--ink)' }}>
                                        <Icon name="check-circle-2" size={24} className="" style={{ color: isRecovery ? 'var(--warm-muted)' : 'var(--indigo)' }} /> Lesson Checkpoint
                                    </h3>

                                    <div className="space-y-6">
                                        <p className="text-lg font-medium leading-relaxed" style={{ color: 'var(--warm)' }}>
                                            {content[section].quiz.question}
                                        </p>

                                        <div className="grid md:grid-cols-2 gap-4">
                                            {content[section].quiz.options.map((opt, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => setQuizResult(opt.value)}
                                                    className={`p-6 rounded-xl text-left transition-all border-2 flex items-center justify-between group active:scale-95 ${
                                                        quizResult === opt.value && opt.value === 'correct'
                                                        ? 'bg-emerald-50 border-emerald-400 shadow-sm'
                                                        : quizResult === opt.value && opt.value === 'wrong'
                                                        ? 'bg-rose-50 border-rose-300 shadow-sm'
                                                        : 'bg-white hover:border-indigo-300 shadow-sm'
                                                    }`}
                                                    style={ (quizResult === opt.value) ? {} : { borderColor: 'var(--line)' } }
                                                >
                                                    <span className="font-bold" style={{ color: quizResult === opt.value && opt.value === 'correct' ? '#047857' : 'var(--ink)' }}>
                                                        {opt.text}
                                                    </span>
                                                    {quizResult === opt.value && (
                                                        opt.value === 'correct'
                                                        ? <Icon name="check-circle-2" size={24} className="text-emerald-500" />
                                                        : <Icon name="alert-circle" size={24} className="text-rose-400" />
                                                    )}
                                                </button>
                                            ))}
                                        </div>

                                        <AnimatePresence>
                                            {quizResult && (
                                                <motion.div
                                                    initial={{ opacity: 0, y: 10 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    className="p-5 rounded-2xl text-sm font-semibold tracking-tight flex items-start gap-2"
                                                    style={ quizResult === 'correct' ? { color: '#047857', background: 'rgba(16,185,129,0.08)' } : { color: '#e11d48', background: 'rgba(244,63,94,0.06)' } }
                                                >
                                                    {quizResult === 'correct' && <Icon name="sparkles" size={16} className="mt-0.5 shrink-0" />}
                                                    <span>{quizResult === 'correct'
                                                        ? content[section].quiz.feedback
                                                        : "Almost there! Take another look at the biological explanation on the left."}</span>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                </section>
                            </div>
                        </main>

                        <footer className="mono text-center text-[10px] font-black uppercase py-10" style={{ color: 'var(--faint)', letterSpacing: '0.3em' }}>
                            Science Dashboard&nbsp;&nbsp;&nbsp;Synaptic Harmony Module
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
